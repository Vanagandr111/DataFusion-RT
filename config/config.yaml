scale:
  enabled: true
  port: COM7
  baudrate: 9600
  timeout: 1.0
  mode: continuous
  request_command: P
  p1_polling_enabled: true
  p1_poll_interval_sec: 0.1
furnace:
  enabled: false
  port: COM4
  baudrate: 9600
  bytesize: 7
  parity: N
  stopbits: 1.0
  timeout: 1.0
  slave_id: 1
  register_pv: 0
  register_sv: 1
  scale_factor: 0.1
app:
  poll_interval_sec: 1.0
  csv_path: data/measurements.csv
  log_path: logs/app.log
  max_points_on_plot: 500
  test_mode: false
  autosave_settings: true
  enable_file_logging: false
  theme: dark
  start_maximized: true
  fullscreen: false
  font_scale: 1.05
  default_export_format: csv
