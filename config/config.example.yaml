scale:
  enabled: true
  port: COM3
  baudrate: 4800
  timeout: 1.0
  mode: auto
  request_command: "P\r\n"

furnace:
  enabled: true
  port: COM4
  baudrate: 9600
  bytesize: 8
  parity: "N"
  stopbits: 1
  timeout: 1.0
  slave_id: 1
  register_pv: 0
  register_sv: 1
  scale_factor: 0.1

app:
  poll_interval_sec: 1.0
  csv_path: "data/measurements.csv"
  log_path: "logs/app.log"
  max_points_on_plot: 500
  test_mode: false
  autosave_settings: false
  enable_file_logging: false
  theme: "dark"
  start_maximized: true
  fullscreen: false
  font_scale: 1.05
  default_export_format: "csv"
